name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Inject version into source
        run: |
          $ver = '${{ github.event.inputs.version }}'
          (Get-Content CustomControlZ/src/CustomControlZ.cpp) -replace '#define APP_VERSION L"[^"]*"', "#define APP_VERSION L`"$ver`"" | Set-Content CustomControlZ/src/CustomControlZ.cpp
        shell: pwsh

      - name: Build Release x64
        run: msbuild CustomControlZ.slnx /p:Configuration=Release /p:Platform=x64 /m

      - name: Locate and stage exe
        run: |
          echo "Searching for built exe..."
          Get-ChildItem -Recurse -Filter "CustomControlZ.exe" | Select-Object FullName
          Copy-Item -Path (Get-ChildItem -Recurse -Filter "CustomControlZ.exe" | Select-Object -First 1 -ExpandProperty FullName) -Destination "CustomControlZ.exe"
        shell: pwsh

      - name: Create GitHub Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: CustomControlZ v${{ github.event.inputs.version }}
          body: |
            ## CustomControlZ v${{ github.event.inputs.version }}

            Win32 tray application for game key remapping.

            ### Supported Games
            - **Elden Ring** — sprint/dodge/long-press trigger remapping
            - **Toxic Commando** — keyboard keys simulate scroll wheel for weapon switching

            ### Installation
            Download `CustomControlZ.exe` and run it. No installer needed.
          files: CustomControlZ.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
