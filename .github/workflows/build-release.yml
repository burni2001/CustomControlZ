name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Generate changelog
        id: changelog
        run: |
          $prevTag = git describe --tags --abbrev=0 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $prevTag) {
            $log = git log --pretty=format:"- %s" | Out-String
          } else {
            $log = git log "$prevTag..HEAD" --pretty=format:"- %s" | Out-String
          }
          if (-not $log.Trim()) { $log = "- No changes recorded" }
          $escaped = $log -replace "`r`n", "`n"
          "changelog<<EOF`n$escaped`nEOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        shell: pwsh

      - name: Inject version into source
        run: |
          $ver = '${{ github.event.inputs.version }}'
          (Get-Content src/CustomControlZ.cpp) -replace '#define APP_VERSION L"[^"]*"', "#define APP_VERSION L`"$ver`"" | Set-Content src/CustomControlZ.cpp
        shell: pwsh

      - name: Build Release x64
        run: msbuild CustomControlZ.slnx /p:Configuration=Release /p:Platform=x64 /m

      - name: Locate and stage exe
        run: |
          echo "Searching for built exe..."
          Get-ChildItem -Recurse -Filter "CustomControlZ.exe" | Select-Object FullName
          Copy-Item -Path (Get-ChildItem -Recurse -Filter "CustomControlZ.exe" | Select-Object -First 1 -ExpandProperty FullName) -Destination "CustomControlZ.exe"
        shell: pwsh

      - name: Create GitHub Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: CustomControlZ v${{ github.event.inputs.version }}
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.changelog }}

            ### Installation
            Download `CustomControlZ.exe` and run it. No installer needed.
          files: CustomControlZ.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
